    footer{

    <script src="bootstrap/js/bootstrap.js"></script>
    <script type="module">
        // export the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.13.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.13.0/firebase-analytics.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.13.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, updateDoc } from "https://www.gstatic.com/firebasejs/9.13.0/firebase-firestore.js"; 

        import Cookies from '../js_modules/js.cookie.mjs';

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAgEwhwL0DpPUETZf2evitXu_O_kr6OXZc",
            authDomain: "tracker-ac475.firebaseapp.com",
            projectId: "tracker-ac475",
            storageBucket: "tracker-ac475.appspot.com",
            messagingSenderId: "149153242441",
            appId: "1:149153242441:web:5d23c869a764264d544e98"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth();
        var button = document.getElementById("button3");
        var position;



        $('#passshow, #show').click(function() {
            var x = document.getElementById("password");
            if (x.type === "password") {
                x.type = "text";
            } else {
                x.type = "password";
            }
            });

        function valid_fields(){
            var emailAdress = document.getElementById("email").value;
            var pass = document.getElementById("password").value;
            let regex = /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;

        if (emailAdress.match(regex) != null && pass.length > 5){
            if (document.getElementById('error').value = ""){
                document.getElementById('error').innerHTML = "";
            }
            return true; 
        }
        else{
            if (emailAdress.match(regex) == null && pass.length < 6){
                document.getElementById('error').innerHTML = 'please check your email and password <i class="fa-solid fa-xmark"></i>'
            } 
            else{
                if (pass.length < 6){
                document.getElementById('error').innerHTML = 'password is short <i class="fa-solid fa-xmark"></i>'
            }
                if (emailAdress.match(regex) == null){
                document.getElementById('error').innerHTML = 'invalid email <i class="fa-regular fa-envelope"></i>'
            }
            }
            return false;
        } 
        }

        button.addEventListener("mouseover", function (){
            console.log("hovered")
            if(valid_fields()){
                //signin()
            }
            else{
                position == 0 ? (position = 100) : position == 100 ? (position = -100) : (position=0);
                button.style.transform = "translate(" + position + "px, 0px)";
                button.style.transition = "all 0.3s ease";
            }
        })

        function change_button(val){
            if (val){
                document.getElementById('button3').disabled = true;
                document.getElementById('button3').innerHTML = '<i class="fa fa-circle-o-notch fa-spin"></i>Loading';
            }
            else{
                document.getElementById('button3').disabled = false;
                document.getElementById('button3').innerHTML = 'Join';
            }
            
        }

        $('#button3').click(function() {

                      
    
            var email = $('#email');    
            var pass = $('#password');
            //email.val() && pass.val()
            if(valid_fields()){

                change_button(true)  
                signInWithEmailAndPassword(auth, email.val(), pass.val()).then(userCredential => {
                    console.log('everything went fine');
                    console.log("user ID:\t"+userCredential.user);

                    //save the user data here.
                    //Cookies.set('Userid', userCredential.user.uid);
                    if(userCredential != null){
                        window.location.href = "dashboard.html";
                    }

                    //console.log(Cookies.get("Userid"));
                }).catch(function(error) {
                    console.log('there was an error');
                    console.log(error.code);
                    //
                    //
                    if(error.code == "auth/user-not-found"){
                        document.getElementById('error').innerHTML = 'user not found <i class="fa-solid fa-xmark"></i>';
                        change_button(false) 
                    }
                    else if(error.code == "auth/wrong-password"){
                        document.getElementById('error').innerHTML = 'wrong password <i class="fa-solid fa-lock"></i>';
                        change_button(false) 
                    }
                    else{
                        document.getElementById('error').innerHTML = 'there was a problem <i class="fa-regular fa-face-frown"></i>';
                        change_button(false) 
                    }
                });

            }
            else{
                change_button(false)  
            }
        });

        // random marker placement
        var divs = document.getElementsByClassName("markers");

        function centerImages() {
        var image1 = document.getElementById("map");
        var rect1 = image1.getBoundingClientRect();
        var cx = rect1.left + rect1.width * 0.5;    // find center of first image
        var cy = rect1.top + rect1.height * 0.5 - 100;
        //console.log("x: " + cx + " y: " + cy)

        
        for(var i = 0; i < divs.length; i++){
            if(i==0){
                divs[i].style.position = "absolute";
                divs[i].style.left = cx+'px';
                divs[i].style.top = cy+'px';
                divs[i].style.color = 'red';
            }
            else {
                //console.log(divs[i])
                divs[i].style.position = "absolute";
                divs[i].style.left = cx+rand_pos(rect1.width/2-30)+'px';
                divs[i].style.top = cy+rand_pos(rect1.width/2-30)+'px';
                divs[i].style.color = getRandomColor();
            }
        }
        }

        setInterval(centerImages, 3000);

        function move_markers(){
        
            for(var i = 0; i < divs.length; i++){
                divs[i].style.transform = "translate(" + rand_pos2() + "px, "+ rand_pos2() +" px)";
            }
        }

        function rand_pos(width){
            return Math.floor(Math.random() * (width - (-width) + 1)) + (-width);
        }
        function rand_pos2(){
            return Math.floor(Math.random() * (10 - (-10) + 1)) + (-10);
        }

        function getRandomColor() {
            var letters = '0123456789ABCDEF';
            var color = '#';
            for (var i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }
        window.onload = window.onresize = centerImages;

        $('#show').click(function() {
            if($('#passshow').is(':checked')){
                $('#passshow').prop('checked', false);
            }
            else{
                $('#passshow').prop('checked', true);
            }
        })


        $('#register_btn').click(function() {
            window.location.href = "register.html"
        })
        
    </script>
