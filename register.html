<!DOCTYPE html>
<style>
    @font-face {
        font-family: 'RobotoMono';
        src: url(fonts/Roboto_Mono/static/RobotoMono-Bold.ttf);
    }
    *{
        margin: 0;
        font-family: "RobotoMono";
    }
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active{
        -webkit-box-shadow: 0 0 0 30px rgb(235, 235, 235) inset !important;
    }
    body{
        background-color: rgb(232, 242, 251);
        overflow-y: hidden;
    }
    /* header */
    .header{
        width: 100%;
        height: 50px;
        display: flex;
        justify-content:space-evenly;
        align-items: center;
        top: 0;
        position: fixed;

        /* margin-bottom: 20px; */
    }
    #logo{
        width: 95px;
        margin-right: 20px;
    }
    .right_elements{
        display: flex;
        gap: 50px;
        align-items: center;
    }
    .right_elements a{
        text-decoration: none;
        color: black;
    }
    .left_elements{
        display: flex;
        align-items: center;
        gap: 30px;
    }
    .left_elements *{
        color: black;
    }
    #login_btn{
        padding: 7px 20px 7px 20px ;
        border-radius: 50vw;
    }

    /* body */
    .principal{
        display: flex;
        width: 100%;
        width: 100%;
    }
    /* .right{
        margin-top: 20px;
        width: 40%;
        display: inline-block center;
        text-align:center;
    } */
    .right{
        width: 100%;
        display: block;
        /* padding-top: 8%;*/
        padding-top: 20px;
        width: 50%;
        display: inline-block center;
        text-align:center;
        margin: auto;
    }
    .right input:not([type=checkbox]){
            width: 100%;
        }
    .right h2{
        font-weight: 100;
        margin-bottom: 40px;
        margin-top: 10%;
    }
    #email,#password, #first_name, #last_name, #phone_prefix, #phone_num, #confirm_password{
        width: 50%;
        height: 30%;
        border-radius: 10px;
        padding:15px;
        margin-top: 15px;
        background-color: rgb(235, 235, 235);
        border: none;
    }
    .phone_number{
        display: flex;
        height: 30%;
        width: calc(50% + 30px);
        margin: auto;
    }
    #phone_prefix{
        width: 29%;
        appearance: none;
    }
    #phone_num{
        width: 69%;
        margin-left: 2%;
    }
    #remember, #showpass{
        display: flex;
        justify-content: flex-start;
        align-items: center;
        padding: 0;
        margin: auto;
        white-space: nowrap;
        margin-left: 25%;
        margin-top: 10px;
        font-size: 17px;
    }
    #remember input[type='checkbox'],#showpass input[type='checkbox'],label{
        margin: 0;
        padding: 0;
    }
    #error{
        color: red;
        font-size: 10px;
    }
    #button3{
        border-radius: 50vw;
        padding: 5px 13px 5px 13px;
    }
    #button3 i{
        margin: 0 3px 0 3px;
    }
    #gologin{
        font-size: 15px !important;
        margin-top: 10px;
    }
    #button3:hover, #login_btn:hover{
        cursor: pointer;
    }
    #recoverpass{
        color: black;
    }
    #spliter{
        width: 60%;
        margin: 4% auto 4% auto;
    }
    .right #continue-with{
        font-size: 15px;
        margin-top: 0 !important;
    }
    .other-signins{
        width: 60%;
        margin:2% auto;
        display: flex;
        justify-content: space-evenly;
    }
    .other-signins div{
        padding: 2% 7% 2% 7%;
        background-color: rgb(232, 242, 251);
        border-radius: 0.3vw;
        border: 1px grey solid;
        transition: background-color 0.5s ease;
        display: flex;
        align-items: center;
    }
    .other-signins div:hover{
        background-color: rgb(219, 219, 219);
        transition: background-color 0.5s ease;
        cursor: pointer;
    }
    .icon{
        width: 20px;
    }
    /* .left{
        width: 60%;
        display: flex;
        position: relative;
        justify-content: center;
    } */

    .left{
            position: absolute;
            z-index: -1;
            width: 100%;
            opacity: 0.28;;
        }
    #map{
        width: 100%;
        height: 86vh;
        position: relative;
        z-index: -1;
        /*height: 100px; width: 200px; */
        opacity: 0.7;
    }
    .left .markers{
        position: absolute;
        top: 30px;
        left: 600px;
        margin: auto;
        color: red;
        font-size: 25px;
        z-index: 3;
        transition: all 1s ease-in-out;
    }
    /* footer{
        width: 100%;
        display: flex;
        justify-content: center;
        bottom: 0;
        position: relative;
        border-top: black 2px solid;
        padding: 0;
    } */
    footer{
            margin-top: 50px;
            justify-content: center;
            position:fixed;
            bottom: 0;
            border-top: black 2px solid;
            padding: 10px;
            width: 100%;
            text-align: center;
        }

    @media screen and (max-width:800px) {
        body{
            /*overflow-y: hidden;*/
        }
        .header{
            font-size: 2vw;
            border-bottom: black 2px solid;
        }
        #logo{
            width: 50px;
            margin-right: 20px;
        }

        .right_elements{
            width: 60%;
            display: flex;
            gap: 50px;
            align-items: center;
        }
        .right_elements a{
            font-size: 2.5vw;
            text-decoration: none;
            color: black;
        }
        .nophone{
            display: none;
        }
        #login_btn{
            padding: 3px 10px 3px 10px ;
            border-radius: 50vw;
        }
        .principal{
            /*display: block;*/
            width: 100%;
            color: black;
        }
        .principal p:not(#error){
            font-size: 10vw;
        }
        .right{
            width: 100%;
            display: block;
           /* padding-top: 8%;*/
        }
        .right input:not([type=checkbox]){
            width: 100%;
        }
        #phone_prefix{
            width: 34%;
            appearance: none;
            /*padding: 15px;*/
        }
        #phone_num{
            width: 64%;
            margin-left: 2%;
        }
        .left{
            position: absolute;
            z-index: -1;
            width: 100%;
            opacity: 0.28;;
        }
        .other-signins div{
            border-radius: 1.5vw;
        }
        #map{
            top: 0;
            width: 100%;
            height: 95vh;
        }
        .right form{
            margin: auto;
            width: 100%;
           /* background-color: rgba(0, 0, 0, 0.062);*/
            border-radius: 1vw;
            padding: 2% 0 2% 0;
        }

        footer{
            margin-top: 50px;
            justify-content: center;
            position:relative;
            border-top: black 2px solid;
            padding: 0;
            width: 100%;
        }
            
    }
</style>

            let regex_email = /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;///^[\+]?[(]?[0-9]{3}[)]?[-\s\.]?[0-9]{3}[-\s\.]?[0-9]{4,6}$/im
            let regex_phone = /^[0-9]{9}$/;

        if (emailAdress.match(regex_email) != null && pass.length > 5 && pass == pass2 && phone_num.match(regex_phone)){
                document.getElementById('error').innerHTML = "";
                //console.log("name:" ,first_name ,last_name ,"\nphone num:",phone_prefix + phone_num ,"\email:", emailAdress ,"\npass1:", pass,"\tpass2:", pass2)
            return true; 
        }
        else{
            if (first_name == "" || last_name == "" || phone_num == "" || emailAdress == "" || pass == "" || pass2 == ""){
                document.getElementById('error').innerHTML = 'please fill all the blanks <i class="fa-regular fa-keyboard"></i>'
            } 
            else{
                if(pass != pass2){
                    document.getElementById('error').innerHTML = 'password dont match <i class="fa-solid fa-not-equal"></i>'
                }
                if (pass.length < 6){
                document.getElementById('error').innerHTML = 'password is too short <i class="fa-solid fa-xmark"></i>'
                }
                if (phone_num.match(regex_phone) == null){
                document.getElementById('error').innerHTML = 'invalid phone number <i class="fa-regular fa-envelope"></i>'
                }
                if (emailAdress.match(regex_email) == null){
                document.getElementById('error').innerHTML = 'invalid email <i class="fa-regular fa-envelope"></i>'
                }
            }
            return false;
        } 
        }

        // random marker placement
        var divs = document.getElementsByClassName("markers");

        function centerImages() {
        var image1 = document.getElementById("map");
        var rect1 = image1.getBoundingClientRect();
        var cx = rect1.left + rect1.width * 0.5 - 600;    // find center of first image
        var cy = rect1.top + rect1.height * 0.5 -200;
        //console.log("x: " + cx + " y: " + cy)

        
        for(var i = 0; i < divs.length; i++){
            if(i==0){
                divs[i].style.position = "absolute";
                divs[i].style.left = cx+'px';
                divs[i].style.top = cy+'px';
                divs[i].style.color = 'red';
            }
            else {
                //console.log(divs[i])
                divs[i].style.position = "absolute";
                divs[i].style.left = cx+rand_pos(rect1.width/2-30)+'px';
                divs[i].style.top = cy+rand_pos(rect1.width/2-30)+'px';
                divs[i].style.color = getRandomColor();
            }
        }
        }

        setInterval(centerImages, 3000);

        function move_markers(){
        
            for(var i = 0; i < divs.length; i++){
                divs[i].style.transform = "translate(" + rand_pos2() + "px, "+ rand_pos2() +" px)";
            }
        }

        function rand_pos(width){
            return Math.floor(Math.random() * (width - (-width) + 1)) + (-width);
        }
        function rand_pos2(){
            return Math.floor(Math.random() * (10 - (-10) + 1)) + (-10);
        }

        function getRandomColor() {
            var letters = '0123456789ABCDEF';
            var color = '#';
            for (var i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }
        window.onload = window.onresize = centerImages;
